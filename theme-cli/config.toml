# theme-cli configuration
# Loaded from $XDG_CONFIG_HOME/theme-cli/config.toml, falling back to this file
# (resolved relative to the crate root).

# Absolute path to this dotfiles repo. Used to locate vendored theme assets.
repo_path = "/home/ole/workspace/dotfiles"

[gtk]
# GTK theme names as shown in gnome-tweaks. These must be installed.
light = "Everforest-Light"
dark  = "Everforest-Dark"
